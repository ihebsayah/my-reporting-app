version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: reporting-app-label-studio-db
    environment:
      POSTGRES_DB: ${LABEL_STUDIO_DB_NAME:-labelstudio}
      POSTGRES_USER: ${LABEL_STUDIO_DB_USER:-labelstudio}
      POSTGRES_PASSWORD: ${LABEL_STUDIO_DB_PASSWORD:-labelstudio}
    volumes:
      - label_studio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LABEL_STUDIO_DB_USER:-labelstudio} -d ${LABEL_STUDIO_DB_NAME:-labelstudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: reporting-app-label-studio
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LABEL_STUDIO_PORT:-8080}:8080"
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: ${LABEL_STUDIO_DB_NAME:-labelstudio}
      POSTGRE_USER: ${LABEL_STUDIO_DB_USER:-labelstudio}
      POSTGRE_PASSWORD: ${LABEL_STUDIO_DB_PASSWORD:-labelstudio}
      POSTGRE_PORT: 5432
      POSTGRE_HOST: postgres
      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK: "true"
      LABEL_STUDIO_BASE_DATA_DIR: /label-studio/data
    volumes:
      - label_studio_data:/label-studio/data

volumes:
  label_studio_postgres_data:
  label_studio_data:
